<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend AI Review</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-label input {
            width: auto;
        }

        .results {
            margin-top: 2rem;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: var(--bg-tertiary);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .summary-number {
            font-size: 2rem;
            font-weight: bold;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .error-count { color: var(--error); }
        .warning-count { color: var(--warning); }
        .suggestion-count { color: var(--accent); }

        .issue {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid var(--border);
        }

        .issue.error { border-left-color: var(--error); }
        .issue.warning { border-left-color: var(--warning); }
        .issue.suggestion { border-left-color: var(--accent); }

        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .issue-rule {
            font-weight: 600;
        }

        .issue-file {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .issue-message {
            color: var(--text-secondary);
        }

        .issue-code {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            margin-top: 0.5rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Frontend AI Review</h1>
            <p class="subtitle">AI-Powered Code Review for Frontend Developers</p>
        </header>

        <div class="card">
            <div class="form-group">
                <label for="projectPath">Project Path</label>
                <input type="text" id="projectPath" placeholder="/path/to/project" value="/Users/half/Desktop/openClaw/electron">
            </div>

            <div class="form-group">
                <label>Categories</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" value="react" checked> React
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="vue" checked> Vue
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="typescript" checked> TypeScript
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="security" checked> Security
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="performance" checked> Performance
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="best-practice" checked> Best Practice
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="severity">Minimum Severity</label>
                <select id="severity">
                    <option value="suggestion">Suggestion</option>
                    <option value="warning" selected>Warning</option>
                    <option value="error">Error</option>
                </select>
            </div>

            <button class="btn" id="runBtn" onclick="runReview()">
                🚀 Run Review
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing code...</p>
        </div>

        <div class="results hidden" id="results">
            <div class="summary" id="summary"></div>
            <div id="issues"></div>
        </div>
    </div>

    <script>
        async function runReview() {
            const projectPath = document.getElementById('projectPath').value;
            const severity = document.getElementById('severity').value;
            
            const categories = Array.from(document.querySelectorAll('.checkbox-group input:checked'))
                .map(cb => cb.value);

            const btn = document.getElementById('runBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:3000/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        projectPath,
                        severity,
                        category: categories
                    })
                });

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
                results.classList.remove('hidden');
            }
        }

        function displayResults(data) {
            const summary = document.getElementById('summary');
            const issues = document.getElementById('issues');

            const stats = data.stats || { errorCount: 0, warningCount: 0, suggestionCount: 0 };
            
            summary.innerHTML = `
                <div class="summary-card">
                    <div class="summary-number">${data.filesAnalyzed || 0}</div>
                    <div class="summary-label">Files Analyzed</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number error-count">${stats.errorCount}</div>
                    <div class="summary-label">Errors</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number warning-count">${stats.warningCount}</div>
                    <div class="summary-label">Warnings</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number suggestion-count">${stats.suggestionCount}</div>
                    <div class="summary-label">Suggestions</div>
                </div>
            `;

            const issuesHtml = (data.results || []).map(result => {
                return result.issues.map(issue => `
                    <div class="issue ${issue.severity}">
                        <div class="issue-header">
                            <span class="issue-rule">[${issue.ruleId}]</span>
                            <span class="issue-file">${result.file}:${issue.location.start.line}</span>
                        </div>
                        <div class="issue-message">${issue.message}</div>
                    </div>
                `).join('');
            }).join('');

            issues.innerHTML = issuesHtml || '<p>No issues found! 🎉</p>';
        }
    </script>
</body>
</html>
