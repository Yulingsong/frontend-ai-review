<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend AI Review - Web UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #fff; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #4fc3f7; }
    .upload-area { border: 2px dashed #444; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
    .upload-area:hover { border-color: #4fc3f7; background: #2a2a2a; }
    .upload-area input { display: none; }
    .btn { background: #4fc3f7; color: #000; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px 5px; }
    .btn:hover { background: #29b6f6; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .config { background: #2a2a2a; padding: 20px; border-radius: 10px; margin: 20px 0; }
    .config label { display: block; margin: 10px 0; }
    .config input, .config select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: #fff; }
    .results { margin-top: 30px; }
    .file-result { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .file-title { font-size: 18px; font-weight: bold; color: #4fc3f7; margin-bottom: 10px; }
    .issue { padding: 8px 12px; margin: 5px 0; border-radius: 4px; }
    .issue.error { background: #4a2a2a; border-left: 4px solid #f44336; }
    .issue.warning { background: #4a4a2a; border-left: 4px solid #ff9800; }
    .issue.suggestion { background: #2a3a4a; border-left: 4px solid #2196f3; }
    .summary { background: #333; padding: 20px; border-radius: 10px; margin: 20px 0; }
    .summary h2 { margin-bottom: 15px; }
    .stat { display: inline-block; margin: 10px 20px 10px 0; font-size: 18px; }
    .stat.error { color: #f44336; }
    .stat.warning { color: #ff9800; }
    .stat.suggestion { color: #2196f3; }
    .loading { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #4fc3f7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Frontend AI Review</h1>
    
    <div class="config">
      <h3>⚙️ 配置</h3>
      <label>
        最低严重程度:
        <select id="severity">
          <option value="error">Error</option>
          <option value="warning" selected>Warning</option>
          <option value="suggestion">Suggestion</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="aiEnabled"> 启用 AI 分析
      </label>
      <label>
        API Key:
        <input type="password" id="apiKey" placeholder="OPENAI_API_KEY">
      </label>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" multiple accept=".js,.jsx,.ts,.tsx,.vue">
      <p>📁 点击选择文件或拖拽到此处</p>
      <p style="color: #888; font-size: 14px;">支持 .js, .jsx, .ts, .tsx, .vue</p>
    </div>

    <div style="text-align: center; margin: 20px 0;">
      <button class="btn" onclick="runReview()" id="runBtn">🔍 开始审查</button>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>正在分析代码...</p>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script>
    let selectedFiles = [];

    document.getElementById('fileInput').addEventListener('change', (e) => {
      selectedFiles = Array.from(e.target.files);
      document.querySelector('.upload-area p').textContent = `已选择 ${selectedFiles.length} 个文件`;
    });

    async function runReview() {
      if (selectedFiles.length === 0) {
        alert('请先选择文件');
        return;
      }

      const severity = document.getElementById('severity').value;
      const aiEnabled = document.getElementById('aiEnabled').checked;
      const apiKey = document.getElementById('apiKey').value;

      document.getElementById('loading').style.display = 'block';
      document.getElementById('results').innerHTML = '';
      document.getElementById('runBtn').disabled = true;

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('files', f));
      formData.append('severity', severity);
      formData.append('ai', aiEnabled);

      if (apiKey) {
        localStorage.setItem('fair_api_key', apiKey);
      }

      try {
        // 模拟本地运行 (实际需要后端支持)
        let resultsHtml = '<div class="summary"><h2>📊 审查结果</h2>';
        resultsHtml += '<p>✅ 已分析 ' + selectedFiles.length + ' 个文件</p>';
        resultsHtml += '<p style="color: #888;">提示: 请在本地安装 fair CLI 后运行，或启动 API 服务</p>';
        resultsHtml += '</div>';

        // 检查本地是否有 fair
        try {
          const response = await fetch('http://localhost:3000/api/review', {
            method: 'POST',
            body: formData
          });
          const data = await response.json();
          resultsHtml = renderResults(data);
        } catch (e) {
          resultsHtml += '<div class="file-result"><p>💡 运行以下命令进行审查：</p>';
          resultsHtml += '<code style="background: #333; padding: 10px; display: block; margin-top: 10px;">fair ./src -s ' + severity + (aiEnabled ? ' --ai' : '') + '</code></div>';
        }

        document.getElementById('results').innerHTML = resultsHtml;
      } catch (err) {
        alert('审查失败: ' + err.message);
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('runBtn').disabled = false;
    }

    function renderResults(data) {
      let html = '<div class="summary"><h2>📊 审查结果</h2>';
      let error = 0, warning = 0, suggestion = 0;
      
      (data.issues || []).forEach(f => {
        f.issues.forEach(i => {
          if (i.severity === 'error') error++;
          else if (i.severity === 'warning') warning++;
          else suggestion++;
        });
      });

      html += '<span class="stat error">🔴 Errors: ' + error + '</span>';
      html += '<span class="stat warning">🟡 Warnings: ' + warning + '</span>';
      html += '<span class="stat suggestion">🔵 Suggestions: ' + suggestion + '</span>';
      html += '</div>';

      (data.issues || []).forEach(f => {
        html += '<div class="file-result"><div class="file-title">📁 ' + f.file + '</div>';
        f.issues.forEach(i => {
          html += '<div class="issue ' + i.severity + '">';
          html += '<strong>' + i.ruleId + '</strong> (line ' + i.location.start.line + ')<br>';
          html += i.message;
          html += '</div>';
        });
        html += '</div>';
      });

      return html;
    }

    // Load saved API key
    const savedKey = localStorage.getItem('fair_api_key');
    if (savedKey) {
      document.getElementById('apiKey').value = savedKey;
    }
  </script>
</body>
</html>
